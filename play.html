<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>動画を開いています...</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a2616;color:#d8d2c4;font-family:'Noto Sans JP',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{text-align:center;max-width:360px;width:100%}
.spinner{width:48px;height:48px;border:4px solid rgba(140,200,90,.2);border-top-color:#8cc85a;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
h2{font-size:1rem;color:#c8b878;margin-bottom:8px}
p{font-size:.82rem;color:rgba(216,210,196,.6);line-height:1.6;margin-bottom:20px}
.btn{display:inline-block;padding:14px 28px;background:linear-gradient(135deg,#6aad45,#8cc85a);color:#1a2616;font-size:.88rem;font-weight:700;border-radius:12px;text-decoration:none;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(140,200,90,.3)}
.btn:active{opacity:.85}
.note{font-size:.68rem;color:rgba(216,210,196,.35);margin-top:16px;line-height:1.6}
</style>
</head>
<body>
<div class="card">
  <div class="spinner" id="spinner"></div>
  <h2 id="title">動画を開いています...</h2>
  <p id="msg">ブラウザで動画ページを表示します。<br>自動で開かない場合は下のボタンをタップしてください。</p>
  <a id="openBtn" class="btn" href="#" target="_self">▶ 動画を開く</a>
  <div class="note">
    ※ Googleフォトアプリが開く場合は、<br>
    ボタンを長押し→「ブラウザで開く」を選んでください
  </div>
</div>
<script>
(function(){
  var url = decodeURIComponent(location.hash.slice(1));
  if(!url){
    document.getElementById('title').textContent = 'エラー';
    document.getElementById('msg').textContent = '動画URLが見つかりません。';
    document.getElementById('spinner').style.display = 'none';
    return;
  }
  var btn = document.getElementById('openBtn');
  btn.href = url;

  // Auto-redirect after short delay (staying in browser context)
  setTimeout(function(){
    location.replace(url);
  }, 800);
})();
</script>
</body>
</html>
